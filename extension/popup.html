<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Autoflow Bridge</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      width: 280px;
      background: #1c1b18;
      color: #faf9f5;
      font-family: "Anthropic Sans", system-ui, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      font-size: 13px;
      line-height: 1.5;
    }

    /* ── Header ── */
    header {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 14px 14px 12px;
      border-bottom: 1px solid #242320;
    }

    .logo {
      width: 22px;
      height: 22px;
      object-fit: contain;
      opacity: 0.9;
    }

    .header-text { flex: 1; }

    .header-title {
      font-size: 13px;
      font-weight: 600;
      color: #faf9f5;
      letter-spacing: -0.01em;
    }

    .header-version {
      font-size: 10px;
      color: #5a5750;
      margin-left: 5px;
    }

    .header-subtitle {
      font-size: 10px;
      color: #5a5750;
      margin-top: 1px;
    }

    /* ── Status pill ── */
    .status-pill {
      display: flex;
      align-items: center;
      gap: 5px;
      padding: 3px 8px;
      border-radius: 8px;
      font-size: 11px;
      font-weight: 500;
      background: #242320;
      color: #5a5750;
    }

    .status-pill .dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: #5a5750;
      flex-shrink: 0;
    }

    .status-pill.connected { background: #162418; color: #6ee7b7; }
    .status-pill.connected .dot { background: #22c55e; }
    .status-pill.running   { background: #261e08; color: #fbbf24; }
    .status-pill.running   .dot { background: #f59e0b; }
    .status-pill.offline   { background: #242320; color: #5a5750; }

    /* ── Body ── */
    .body { padding: 10px 14px; display: flex; flex-direction: column; gap: 4px; }

    .row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 4px 0;
    }

    .row-label { color: #5a5750; font-size: 12px; }
    .row-value { color: #b8b3aa; font-size: 12px; text-align: right; }
    .row-value.error { color: #f87171; }

    /* ── Actions ── */
    .actions {
      padding: 10px 14px 14px;
      display: flex;
      flex-direction: column;
      gap: 6px;
      border-top: 1px solid #242320;
    }

    button {
      width: 100%;
      padding: 7px 12px;
      background: transparent;
      color: #c8c3ba;
      border: 1px solid #6a6660;
      border-radius: 8px;
      font-family: "Anthropic Sans", system-ui, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      font-size: 12px;
      font-weight: 500;
      cursor: pointer;
      text-align: center;
      transition: background 0.1s, color 0.1s, border-color 0.1s;
    }

    button:hover { background: #242220; color: #faf9f5; border-color: #4a4740; }

    button.primary {
      background: #faf9f5;
      color: #141413;
      border-color: #faf9f5;
    }
    button.primary:hover { background: #c8c5be; border-color: #c8c5be; }

    button.danger { background: transparent; color: #f87171; border: none; }
    button.danger:hover { background: #1e1210; color: #fca5a5; }

    button.success { background: transparent; color: #6ee7b7; border: none; }
    button.success:hover { background: #101e14; color: #a7f3d0; }
  </style>
</head>
<body>

  <header>
    <img class="logo" id="logo-img" src="icons/icon-light-32.png" alt="">
    <div class="header-text">
      <span class="header-title">Autoflow Bridge</span>
      <span class="header-version">v0.0.4</span>
    </div>
    <div class="status-pill offline" id="status-pill">
      <span class="dot"></span>
      <span id="status-text">Offline</span>
    </div>
  </header>

  <div class="body">
    <div class="row">
      <span class="row-label">Token</span>
      <span class="row-value" id="token-row">none</span>
    </div>
    <div class="row">
      <span class="row-label">Requests</span>
      <span class="row-value" id="stats-row">0</span>
    </div>
    <div class="row">
      <span class="row-label">Success / Failed</span>
      <span class="row-value" id="stats-sf">✓ 0 &nbsp; ✗ 0</span>
    </div>
    <div class="row" id="error-section" style="display:none">
      <span class="row-label">Last error</span>
      <span class="row-value error" id="error-row"></span>
    </div>
  </div>

  <div class="actions">
    <button class="primary" id="btn-flow-tab">Open Google Flow</button>
    <button id="btn-refresh">Refresh Token</button>
    <button id="btn-toggle" class="danger">Disconnect</button>
  </div>

  <script src="popup.js"></script>
</body>
</html>
